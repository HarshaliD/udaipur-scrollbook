<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <filter id="sketch5">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <linearGradient id="dusk5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a5a"/>
      <stop offset="35%" stop-color="#3a4a8a"/>
      <stop offset="65%" stop-color="#c06840"/>
      <stop offset="85%" stop-color="#e89850"/>
      <stop offset="100%" stop-color="#f0b860"/>
    </linearGradient>
    <linearGradient id="lake5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a6a"/>
      <stop offset="40%" stop-color="#204888"/>
      <stop offset="100%" stop-color="#152a50"/>
    </linearGradient>
    <radialGradient id="moonGlow5" cx="0.2" cy="0.22" r="0.2">
      <stop offset="0%" stop-color="#fffff0" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#e0e8ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e0e8ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dusk sky -->
  <rect width="400" height="300" fill="url(#dusk5)" rx="8"/>
  <!-- Moon glow -->
  <rect width="400" height="300" fill="url(#moonGlow5)" rx="8"/>

  <!-- Moon -->
  <circle cx="78" cy="65" r="20" fill="#fffde8" opacity="0.9"/>
  <circle cx="78" cy="65" r="15" fill="#fffef5" opacity="0.95"/>

  <!-- Stars -->
  <circle cx="150" cy="30" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="230" cy="18" r="1" fill="white" opacity="0.7"/>
  <circle cx="300" cy="42" r="1.3" fill="white" opacity="0.75"/>
  <circle cx="350" cy="25" r="1" fill="white" opacity="0.65"/>
  <circle cx="180" cy="50" r="0.9" fill="white" opacity="0.6"/>
  <circle cx="265" cy="60" r="1.1" fill="white" opacity="0.7"/>
  <circle cx="120" cy="45" r="0.8" fill="white" opacity="0.55"/>
  <circle cx="380" cy="55" r="1" fill="white" opacity="0.6"/>

  <!-- Mountain range (silhouette) -->
  <path d="M0,155 Q30,110 70,120 Q110,100 150,118 Q190,105 230,115 Q270,98 310,112 Q350,100 400,118 L400,165 L0,165 Z" fill="#1a2a4a" opacity="0.85" filter="url(#sketch5)"/>
  <!-- Closer foothills -->
  <path d="M0,165 Q60,140 120,150 Q180,138 240,148 Q300,138 360,150 Q380,148 400,152 L400,175 L0,175 Z" fill="#0a1830" opacity="0.7" filter="url(#sketch5)"/>

  <!-- Lake -->
  <rect x="0" y="172" width="400" height="128" fill="url(#lake5)"/>

  <!-- Moon reflection on water -->
  <ellipse cx="78" cy="215" rx="12" ry="30" fill="#fffde8" opacity="0.2" filter="url(#sketch5)"/>
  <!-- Shimmer path -->
  <path d="M65,172 Q78,178 91,172 Q84,190 78,210 Q72,230 65,252 Q72,250 78,252 Q84,250 91,252 Q84,230 78,210 Q72,190 78,172" fill="#e8e0a0" opacity="0.12"/>

  <!-- Evening light reflections on lake -->
  <ellipse cx="280" cy="220" rx="15" ry="40" fill="#e87030" opacity="0.15" filter="url(#sketch5)"/>
  <ellipse cx="320" cy="235" rx="10" ry="30" fill="#e89040" opacity="0.12" filter="url(#sketch5)"/>

  <!-- Water ripples -->
  <ellipse cx="150" cy="205" rx="60" ry="8" fill="none" stroke="#304878" stroke-width="0.8" opacity="0.5"/>
  <ellipse cx="280" cy="240" rx="50" ry="7" fill="none" stroke="#304878" stroke-width="0.8" opacity="0.4"/>
  <ellipse cx="100" cy="250" rx="70" ry="9" fill="none" stroke="#304878" stroke-width="0.7" opacity="0.35"/>
  <ellipse cx="340" cy="260" rx="40" ry="6" fill="none" stroke="#304878" stroke-width="0.6" opacity="0.35"/>

  <!-- Nehru Island / Solar Observatory in lake -->
  <ellipse cx="200" cy="190" rx="38" ry="12" fill="#1e3060" stroke="#304878" stroke-width="1" filter="url(#sketch5)"/>
  <!-- Small structure on island -->
  <rect x="184" y="178" width="32" height="12" fill="#253868" stroke="#3a5090" stroke-width="0.8" filter="url(#sketch5)"/>
  <path d="M184,178 Q200,168 216,178" fill="#1a2c58" stroke="#3a5090" stroke-width="0.8" filter="url(#sketch5)"/>
  <!-- Lights on island -->
  <circle cx="190" cy="180" r="2" fill="#f8d060" opacity="0.9"/>
  <circle cx="200" cy="177" r="2.5" fill="#f8e080" opacity="0.85"/>
  <circle cx="210" cy="180" r="2" fill="#f8d060" opacity="0.9"/>
  <!-- Light reflections -->
  <line x1="190" y1="182" x2="190" y2="198" stroke="#f8d060" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="182" x2="200" y2="202" stroke="#f8e080" stroke-width="1.2" opacity="0.35"/>
  <line x1="210" y1="182" x2="210" y2="198" stroke="#f8d060" stroke-width="1" opacity="0.3"/>

  <!-- Shoreline lights (evening promenade) -->
  <circle cx="50" cy="174" r="2.5" fill="#f8d060" opacity="0.8"/>
  <circle cx="80" cy="173" r="2" fill="#f8d060" opacity="0.7"/>
  <circle cx="330" cy="173" r="2.5" fill="#f8c840" opacity="0.8"/>
  <circle cx="358" cy="174" r="2" fill="#f8d060" opacity="0.7"/>
  <circle cx="385" cy="173" r="1.8" fill="#f8c840" opacity="0.65"/>
  <!-- Light reflections -->
  <line x1="50" y1="176" x2="50" y2="200" stroke="#f8d060" stroke-width="1" opacity="0.2"/>
  <line x1="330" y1="176" x2="332" y2="210" stroke="#f8c840" stroke-width="1" opacity="0.2"/>
  <line x1="358" y1="176" x2="360" y2="205" stroke="#f8d060" stroke-width="0.8" opacity="0.2"/>

  <!-- Boat silhouette -->
  <path d="M140,210 Q165,204 190,207 Q185,220 165,222 Q145,222 140,210 Z" fill="#0a1828" opacity="0.8" filter="url(#sketch5)"/>
  <line x1="165" y1="204" x2="165" y2="190" stroke="#0a1828" stroke-width="1.5" opacity="0.7"/>
  <!-- Small sail -->
  <path d="M165,190 L155,204 L175,204 Z" fill="#203050" opacity="0.6"/>

  <text x="200" y="290" font-family="Georgia, serif" font-size="11" fill="#e8c870" text-anchor="middle" font-style="italic" opacity="0.9">Fateh Sagar Lake</text>
</svg>
