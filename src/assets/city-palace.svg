<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <filter id="sketch1">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde8c8"/>
      <stop offset="100%" stop-color="#f9c784"/>
    </linearGradient>
    <linearGradient id="water1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8dff5"/>
      <stop offset="100%" stop-color="#7bbfe0"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="400" height="300" fill="url(#sky1)" rx="8"/>

  <!-- Distant hills -->
  <ellipse cx="320" cy="180" rx="120" ry="55" fill="#d4b896" opacity="0.4" filter="url(#sketch1)"/>
  <ellipse cx="80" cy="190" rx="90" ry="40" fill="#d4b896" opacity="0.35" filter="url(#sketch1)"/>

  <!-- Lake -->
  <ellipse cx="200" cy="255" rx="200" ry="48" fill="url(#water1)" opacity="0.85"/>
  <!-- Water ripples -->
  <ellipse cx="150" cy="258" rx="40" ry="5" fill="none" stroke="#7aaec8" stroke-width="1" opacity="0.5"/>
  <ellipse cx="260" cy="263" rx="30" ry="4" fill="none" stroke="#7aaec8" stroke-width="1" opacity="0.5"/>
  <ellipse cx="100" cy="265" rx="22" ry="3" fill="none" stroke="#7aaec8" stroke-width="0.8" opacity="0.4"/>

  <!-- Palace base / hill -->
  <path d="M60,220 Q120,195 200,190 Q280,185 340,215 L340,260 L60,260 Z" fill="#e8c99a" filter="url(#sketch1)"/>

  <!-- Main palace wall -->
  <rect x="90" y="160" width="220" height="65" fill="#f0dbb0" stroke="#b8905a" stroke-width="1.5" filter="url(#sketch1)" rx="1"/>

  <!-- Palace towers -->
  <rect x="90" y="130" width="38" height="35" fill="#f0dbb0" stroke="#b8905a" stroke-width="1.5" filter="url(#sketch1)"/>
  <rect x="272" y="130" width="38" height="35" fill="#f0dbb0" stroke="#b8905a" stroke-width="1.5" filter="url(#sketch1)"/>
  <rect x="160" y="115" width="80" height="50" fill="#f0dbb0" stroke="#b8905a" stroke-width="1.5" filter="url(#sketch1)"/>

  <!-- Tower tops (dome style) -->
  <path d="M90,130 Q109,112 128,130" fill="#e8804a" stroke="#b8905a" stroke-width="1.2" filter="url(#sketch1)"/>
  <path d="M272,130 Q291,112 310,130" fill="#e8804a" stroke="#b8905a" stroke-width="1.2" filter="url(#sketch1)"/>
  <path d="M160,115 Q200,90 240,115" fill="#e8804a" stroke="#b8905a" stroke-width="1.2" filter="url(#sketch1)"/>

  <!-- Central dome spire -->
  <line x1="200" y1="90" x2="200" y2="115" stroke="#b8905a" stroke-width="1.8" filter="url(#sketch1)"/>
  <polygon points="200,82 196,93 204,93" fill="#e8804a" stroke="#b8905a" stroke-width="0.8"/>

  <!-- Small turrets on main wall -->
  <rect x="115" y="148" width="18" height="15" fill="#f0dbb0" stroke="#b8905a" stroke-width="1" filter="url(#sketch1)"/>
  <rect x="267" y="148" width="18" height="15" fill="#f0dbb0" stroke="#b8905a" stroke-width="1" filter="url(#sketch1)"/>

  <!-- Arched windows on main wall -->
  <path d="M165,178 Q175,168 185,178 L185,195 L165,195 Z" fill="#d4956a" stroke="#b8905a" stroke-width="1" opacity="0.7"/>
  <path d="M215,178 Q225,168 235,178 L235,195 L215,195 Z" fill="#d4956a" stroke="#b8905a" stroke-width="1" opacity="0.7"/>
  <!-- Gate arch -->
  <path d="M188,220 Q200,207 212,220 L212,230 L188,230 Z" fill="#c47840" stroke="#b8905a" stroke-width="1.2" opacity="0.9"/>

  <!-- Palace reflection in lake -->
  <rect x="155" y="245" width="90" height="20" fill="#b8d8ea" opacity="0.3" filter="url(#sketch1)"/>

  <!-- Clouds -->
  <ellipse cx="70" cy="45" rx="38" ry="14" fill="white" opacity="0.6" filter="url(#sketch1)"/>
  <ellipse cx="95" cy="38" rx="25" ry="12" fill="white" opacity="0.55"/>
  <ellipse cx="310" cy="55" rx="32" ry="12" fill="white" opacity="0.5" filter="url(#sketch1)"/>
  <ellipse cx="335" cy="49" rx="20" ry="10" fill="white" opacity="0.45"/>

  <!-- Sketch label -->
  <text x="200" y="285" font-family="Georgia, serif" font-size="11" fill="#8a6a3a" text-anchor="middle" font-style="italic" opacity="0.8">City Palace</text>
</svg>
