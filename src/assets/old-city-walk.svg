<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <filter id="sketch6">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <linearGradient id="sky6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2060"/>
      <stop offset="50%" stop-color="#704080"/>
      <stop offset="100%" stop-color="#c06060"/>
    </linearGradient>
    <radialGradient id="lanternGlow1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f8d060" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f8d060" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lanternGlow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f09040" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f09040" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky (evening) -->
  <rect width="400" height="300" fill="url(#sky6)" rx="8"/>

  <!-- ===== BUILDINGS LEFT ===== -->
  <!-- Far left building -->
  <rect x="0" y="60" width="75" height="200" fill="#e07050" stroke="#c05030" stroke-width="1.5" filter="url(#sketch6)"/>
  <!-- Windows left far -->
  <rect x="10" y="75" width="20" height="25" fill="#f8e090" stroke="#c05030" stroke-width="0.8" opacity="0.85" filter="url(#sketch6)"/>
  <rect x="42" y="75" width="20" height="25" fill="#f8e090" stroke="#c05030" stroke-width="0.8" opacity="0.8" filter="url(#sketch6)"/>
  <rect x="10" y="115" width="20" height="22" fill="#f8d070" stroke="#c05030" stroke-width="0.8" opacity="0.7" filter="url(#sketch6)"/>
  <rect x="42" y="115" width="20" height="22" fill="#f8c870" stroke="#c05030" stroke-width="0.8" opacity="0.75" filter="url(#sketch6)"/>
  <!-- Decorative band / balcony left -->
  <rect x="0" y="140" width="75" height="8" fill="#c04828" opacity="0.4" filter="url(#sketch6)"/>
  <rect x="5" y="155" width="65" height="5" fill="#d06040" opacity="0.3"/>

  <!-- Left mid building -->
  <rect x="0" y="90" width="55" height="170" fill="#d08060" stroke="#b06040" stroke-width="1.5" filter="url(#sketch6)"/>
  <rect x="8" y="100" width="18" height="20" fill="#f8d870" stroke="#b06040" stroke-width="0.8" opacity="0.8" filter="url(#sketch6)"/>
  <rect x="32" y="100" width="18" height="20" fill="#f8c860" stroke="#b06040" stroke-width="0.8" opacity="0.75" filter="url(#sketch6)"/>
  <!-- Jharokha (overhanging window balcony) left -->
  <rect x="8" y="125" width="40" height="28" fill="#e87848" stroke="#b06040" stroke-width="1" filter="url(#sketch6)"/>
  <rect x="4" y="122" width="48" height="5" fill="#c05030" opacity="0.5"/>
  <path d="M8,125 Q28,115 48,125" fill="none" stroke="#f0a060" stroke-width="1" opacity="0.5"/>
  <!-- Decorative arch in jharokha -->
  <path d="M14,128 Q28,120 42,128" fill="#d06030" opacity="0.5" stroke="#b04020" stroke-width="0.8"/>

  <!-- ===== BUILDINGS RIGHT ===== -->
  <!-- Far right building -->
  <rect x="325" y="55" width="75" height="205" fill="#60a890" stroke="#409878" stroke-width="1.5" filter="url(#sketch6)"/>
  <rect x="332" y="70" width="20" height="25" fill="#f8e090" stroke="#409878" stroke-width="0.8" opacity="0.85" filter="url(#sketch6)"/>
  <rect x="365" y="70" width="20" height="25" fill="#f8e090" stroke="#409878" stroke-width="0.8" opacity="0.8" filter="url(#sketch6)"/>
  <rect x="332" y="110" width="20" height="22" fill="#f8d070" stroke="#409878" stroke-width="0.8" opacity="0.75" filter="url(#sketch6)"/>
  <rect x="365" y="110" width="20" height="22" fill="#f8c870" stroke="#409878" stroke-width="0.8" opacity="0.7" filter="url(#sketch6)"/>
  <rect x="325" y="135" width="75" height="7" fill="#306848" opacity="0.4" filter="url(#sketch6)"/>

  <!-- Right mid building -->
  <rect x="345" y="85" width="55" height="175" fill="#5090a0" stroke="#3878888" stroke-width="1.5" filter="url(#sketch6)"/>
  <rect x="352" y="95" width="18" height="20" fill="#f8d870" stroke="#306878" stroke-width="0.8" opacity="0.8" filter="url(#sketch6)"/>
  <rect x="376" y="95" width="18" height="20" fill="#f8c860" stroke="#306878" stroke-width="0.8" opacity="0.75" filter="url(#sketch6)"/>
  <!-- Jharokha right -->
  <rect x="352" y="120" width="40" height="28" fill="#4888a8" stroke="#306878" stroke-width="1" filter="url(#sketch6)"/>
  <rect x="348" y="117" width="48" height="5" fill="#206058" opacity="0.5"/>
  <path d="M352,120 Q372,110 392,120" fill="none" stroke="#70b0c0" stroke-width="1" opacity="0.5"/>

  <!-- ===== STREET ===== -->
  <!-- Street cobblestones -->
  <rect x="55" y="220" width="290" height="80" fill="#d4b888" filter="url(#sketch6)"/>
  <!-- Cobble hints -->
  <ellipse cx="100" cy="240" rx="12" ry="5" fill="#c8a870" opacity="0.4" filter="url(#sketch6)"/>
  <ellipse cx="160" cy="250" rx="14" ry="5" fill="#c0a060" opacity="0.35" filter="url(#sketch6)"/>
  <ellipse cx="240" cy="243" rx="12" ry="5" fill="#c8a870" opacity="0.4" filter="url(#sketch6)"/>
  <ellipse cx="300" cy="252" rx="13" ry="5" fill="#c0a060" opacity="0.35" filter="url(#sketch6)"/>
  <ellipse cx="200" cy="268" rx="16" ry="5" fill="#b89858" opacity="0.3" filter="url(#sketch6)"/>

  <!-- Perspective lines for street -->
  <line x1="55" y1="220" x2="200" y2="150" stroke="#b89858" stroke-width="0.7" opacity="0.3"/>
  <line x1="345" y1="220" x2="200" y2="150" stroke="#b89858" stroke-width="0.7" opacity="0.3"/>

  <!-- ===== STRINGS OF LIGHTS ===== -->
  <!-- String 1 -->
  <path d="M30,100 Q80,110 130,105 Q160,102 200,108 Q240,113 280,108 Q330,103 380,110" fill="none" stroke="#c0a060" stroke-width="1" opacity="0.7" filter="url(#sketch6)"/>
  <!-- String 2 lower -->
  <path d="M20,140 Q70,148 120,143 Q160,140 200,146 Q240,150 290,145 Q340,140 390,148" fill="none" stroke="#b09050" stroke-width="1" opacity="0.6" filter="url(#sketch6)"/>

  <!-- ===== LANTERNS ===== -->
  <!-- Lantern 1 - orange -->
  <ellipse cx="130" cy="108" rx="9" ry="13" fill="#f8983a" stroke="#e06828" stroke-width="1" filter="url(#sketch6)"/>
  <line x1="130" y1="95" x2="130" y2="105" stroke="#c08030" stroke-width="1.2"/>
  <rect x="125" y="118" width="10" height="4" fill="#d07020" opacity="0.6"/>
  <!-- Lantern glow 1 -->
  <ellipse cx="130" cy="108" rx="22" ry="22" fill="url(#lanternGlow2)" opacity="0.6"/>

  <!-- Lantern 2 - red -->
  <ellipse cx="200" cy="111" rx="10" ry="14" fill="#e84038" stroke="#c02020" stroke-width="1" filter="url(#sketch6)"/>
  <line x1="200" y1="97" x2="200" y2="108" stroke="#b02020" stroke-width="1.2"/>
  <rect x="194" y="122" width="12" height="4" fill="#a01818" opacity="0.6"/>
  <!-- Lantern glow 2 -->
  <ellipse cx="200" cy="111" rx="25" ry="25" fill="url(#lanternGlow1)" opacity="0.5"/>

  <!-- Lantern 3 - pink -->
  <ellipse cx="270" cy="109" rx="9" ry="13" fill="#f07090" stroke="#c04060" stroke-width="1" filter="url(#sketch6)"/>
  <line x1="270" y1="96" x2="270" y2="106" stroke="#a03050" stroke-width="1.2"/>
  <rect x="265" y="119" width="10" height="4" fill="#902848" opacity="0.6"/>
  <!-- Lantern glow 3 -->
  <ellipse cx="270" cy="109" rx="20" ry="20" fill="url(#lanternGlow2)" opacity="0.5"/>

  <!-- Smaller lanterns on lower string -->
  <ellipse cx="90" cy="144" rx="7" ry="10" fill="#f8b030" stroke="#d09020" stroke-width="0.8" filter="url(#sketch6)"/>
  <ellipse cx="90" cy="144" rx="16" ry="16" fill="url(#lanternGlow1)" opacity="0.4"/>
  <ellipse cx="160" cy="146" rx="7" ry="10" fill="#e05050" stroke="#c03030" stroke-width="0.8" filter="url(#sketch6)"/>
  <ellipse cx="240" cy="146" rx="7" ry="10" fill="#50b080" stroke="#308060" stroke-width="0.8" filter="url(#sketch6)"/>
  <ellipse cx="310" cy="144" rx="7" ry="10" fill="#f8a040" stroke="#d08020" stroke-width="0.8" filter="url(#sketch6)"/>

  <!-- Fabric banners / dupattas hanging -->
  <path d="M55,160 Q75,170 95,160 Q95,180 75,185 Z" fill="#e87050" opacity="0.55" filter="url(#sketch6)"/>
  <path d="M305,158 Q325,168 345,158 Q345,178 325,183 Z" fill="#7060c0" opacity="0.55" filter="url(#sketch6)"/>

  <!-- Stalls / shops -->
  <!-- Left stall -->
  <rect x="55" y="195" width="55" height="28" fill="#f09050" stroke="#c07030" stroke-width="1" filter="url(#sketch6)"/>
  <path d="M52,192 Q82,185 112,192" fill="#e06030" stroke="#c04820" stroke-width="1" filter="url(#sketch6)"/>
  <!-- Right stall -->
  <rect x="290" y="193" width="55" height="28" fill="#70b080" stroke="#508870" stroke-width="1" filter="url(#sketch6)"/>
  <path d="M287,190 Q317,183 347,190" fill="#508860" stroke="#306840" stroke-width="1" filter="url(#sketch6)"/>

  <!-- Marigold decorations on stall -->
  <circle cx="68" cy="198" r="4" fill="#f8a030" opacity="0.8"/>
  <circle cx="82" cy="196" r="4" fill="#f4b040" opacity="0.75"/>
  <circle cx="96" cy="198" r="4" fill="#f8a030" opacity="0.8"/>

  <!-- Walking figures silhouette -->
  <circle cx="175" cy="212" r="7" fill="#3a2810" filter="url(#sketch6)"/>
  <path d="M170,218 Q175,235 180,218" fill="#7a4830" stroke="#5a3018" stroke-width="0.8" filter="url(#sketch6)"/>
  <circle cx="225" cy="215" r="6" fill="#2a1808" filter="url(#sketch6)"/>
  <path d="M221,221 Q225,237 229,221" fill="#e87050" stroke="#c05030" stroke-width="0.8" filter="url(#sketch6)"/>
  <!-- Person in sari color hint -->

  <!-- Stars peeking above -->
  <circle cx="200" cy="20" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="280" cy="35" r="1" fill="white" opacity="0.6"/>
  <circle cx="120" cy="28" r="1" fill="white" opacity="0.55"/>

  <text x="200" y="292" font-family="Georgia, serif" font-size="11" fill="#f8d888" text-anchor="middle" font-style="italic" opacity="0.9">Old City Walk</text>
</svg>
