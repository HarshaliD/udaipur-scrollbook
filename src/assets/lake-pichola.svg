<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <filter id="sketch2">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8e8f8"/>
      <stop offset="60%" stop-color="#d8eefc"/>
      <stop offset="100%" stop-color="#b8daf0"/>
    </linearGradient>
    <linearGradient id="lake2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#89c4e1"/>
      <stop offset="100%" stop-color="#4a9bbf"/>
    </linearGradient>
    <linearGradient id="sunset2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f9c784" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f9a84a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f9c784" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="400" height="300" fill="url(#sky2)" rx="8"/>

  <!-- Sun glow -->
  <circle cx="310" cy="80" r="35" fill="#fde08a" opacity="0.35"/>
  <circle cx="310" cy="80" r="22" fill="#fdd060" opacity="0.5"/>
  <circle cx="310" cy="80" r="14" fill="#fdc840" opacity="0.7"/>

  <!-- Distant Jag Mandir palace on island -->
  <rect x="290" y="110" width="70" height="35" fill="#f0dbb0" stroke="#b8905a" stroke-width="1" filter="url(#sketch2)" opacity="0.8"/>
  <path d="M290,110 Q325,92 360,110" fill="#e8804a" stroke="#b8905a" stroke-width="1" filter="url(#sketch2)" opacity="0.8"/>
  <rect x="310" y="100" width="30" height="12" fill="#f0dbb0" stroke="#b8905a" stroke-width="0.8" filter="url(#sketch2)" opacity="0.8"/>
  <path d="M310,100 Q325,90 340,100" fill="#e8804a" stroke="#b8905a" stroke-width="0.8" opacity="0.75"/>
  <line x1="325" y1="87" x2="325" y2="100" stroke="#b8905a" stroke-width="1.2"/>
  <!-- Island base -->
  <ellipse cx="325" cy="148" rx="55" ry="12" fill="#c8a870" opacity="0.7" filter="url(#sketch2)"/>

  <!-- Distant hills/mountains -->
  <path d="M0,145 Q50,115 110,128 Q160,115 200,125 Q240,110 300,118 Q350,108 400,120 L400,155 L0,155 Z" fill="#b8d4b0" opacity="0.4" filter="url(#sketch2)"/>

  <!-- Lake -->
  <rect x="0" y="152" width="400" height="148" fill="url(#lake2)" rx="2"/>
  <!-- Sunset shimmer on water -->
  <rect x="0" y="152" width="400" height="148" fill="url(#sunset2)"/>

  <!-- Water ripples -->
  <ellipse cx="80" cy="185" rx="50" ry="7" fill="none" stroke="#6aaec8" stroke-width="1" opacity="0.4"/>
  <ellipse cx="200" cy="220" rx="80" ry="10" fill="none" stroke="#6aaec8" stroke-width="1" opacity="0.35"/>
  <ellipse cx="340" cy="200" rx="45" ry="6" fill="none" stroke="#6aaec8" stroke-width="0.8" opacity="0.3"/>
  <ellipse cx="140" cy="255" rx="60" ry="8" fill="none" stroke="#6aaec8" stroke-width="0.8" opacity="0.3"/>

  <!-- Boat body -->
  <path d="M110,210 Q115,198 200,195 Q285,198 290,210 Q280,228 200,230 Q120,228 110,210 Z" fill="#e8c880" stroke="#a07830" stroke-width="1.8" filter="url(#sketch2)"/>
  <!-- Boat wood planks -->
  <line x1="155" y1="196" x2="152" y2="228" stroke="#a07830" stroke-width="0.8" opacity="0.4"/>
  <line x1="200" y1="195" x2="200" y2="230" stroke="#a07830" stroke-width="0.8" opacity="0.4"/>
  <line x1="245" y1="196" x2="248" y2="228" stroke="#a07830" stroke-width="0.8" opacity="0.4"/>

  <!-- Boat canopy / awning -->
  <path d="M140,195 Q200,180 260,195" fill="none" stroke="#e05a30" stroke-width="2" filter="url(#sketch2)"/>
  <line x1="145" y1="195" x2="145" y2="213" stroke="#c04828" stroke-width="1.5"/>
  <line x1="255" y1="195" x2="255" y2="213" stroke="#c04828" stroke-width="1.5"/>
  <!-- Canopy fabric -->
  <path d="M140,195 L145,213 L255,213 L260,195 Q200,183 140,195 Z" fill="#e87040" opacity="0.5" filter="url(#sketch2)"/>

  <!-- Seated travelers silhouettes -->
  <circle cx="178" cy="208" r="8" fill="#6b4226" filter="url(#sketch2)"/>
  <rect x="172" y="212" width="12" height="10" fill="#6b4226" rx="2" filter="url(#sketch2)"/>
  <circle cx="222" cy="208" r="8" fill="#5a3820" filter="url(#sketch2)"/>
  <rect x="216" y="212" width="12" height="10" fill="#5a3820" rx="2" filter="url(#sketch2)"/>

  <!-- Oarsman -->
  <circle cx="268" cy="205" r="7" fill="#4a2e18" filter="url(#sketch2)"/>
  <!-- Oar -->
  <line x1="268" y1="210" x2="295" y2="245" stroke="#7a5030" stroke-width="2.5" filter="url(#sketch2)"/>

  <!-- Boat reflection -->
  <path d="M120,232 Q200,228 280,232 Q275,248 200,252 Q125,248 120,232 Z" fill="#6aaec8" opacity="0.25" filter="url(#sketch2)"/>

  <!-- Floating lotus / lily -->
  <circle cx="80" cy="240" r="8" fill="#f4b8c8" opacity="0.7" filter="url(#sketch2)"/>
  <circle cx="80" cy="240" r="4" fill="#f090a0" opacity="0.8"/>
  <circle cx="350" cy="260" r="6" fill="#f4b8c8" opacity="0.6" filter="url(#sketch2)"/>

  <!-- Clouds -->
  <ellipse cx="60" cy="50" rx="40" ry="13" fill="white" opacity="0.55" filter="url(#sketch2)"/>
  <ellipse cx="85" cy="43" rx="28" ry="11" fill="white" opacity="0.5"/>
  <ellipse cx="200" cy="35" rx="35" ry="11" fill="white" opacity="0.4" filter="url(#sketch2)"/>

  <text x="200" y="285" font-family="Georgia, serif" font-size="11" fill="#2a5f7a" text-anchor="middle" font-style="italic" opacity="0.8">Lake Pichola Boat Ride</text>
</svg>
